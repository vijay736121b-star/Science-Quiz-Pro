<!DOCTYPE html>
<html>

<head>
    <title>Science Quiz Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T00DE4BRNZ"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-T00DE4BRNZ');
</script>
</head>

<body>
    <img src="logo.png" width="120">

    <h1>🚀 Science Quiz Pro</h1>
    
<input type="text" id="playerName" placeholder="Enter Your Name">
    <input type="text" id="aiTopic" placeholder="Enter Science Topic (e.g. Space)">
<button onclick="startAIQuizFromUI()">Generate AI Quiz</button>
    
    <p id="question"></p>
    
<div class="progress-container">
  <div id="progressBar" class="progress-bar"></div>
</div>
    <div id="answers"></div>

    <p id="result"></p>

    <p id="score"></p>
    
<button onclick="restartQuiz()">🏠 Home</button>
    

<button onclick="exitQuiz()">Exit Quiz</button>
<button onclick="prevQuestion()">⏮ Previous</button>

<button onclick="nextQuestion()">Next ⏭</button>

<script src="script.js"></script>
    
    <script>
        window.startAIQuizFromUI = function() {
    let topic = document.getElementById("aiTopic").value;
    if(!topic) {
        alert("Please enter a topic first!");
        return;
    }
    loadAIQuestions(topic);
};
        
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('pwabuilder-sw.js');
}

</script>
</body>

</html>
