name: Build Android Play Store App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp -r index.html script.js style.css www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          rm -f capacitor.config.json
          echo '{"appId":"com.sciencequiz.pro","appName":"Science Quiz Pro","webDir":"www","bundledWebRuntime":false}' > capacitor.config.json
      - name: Install Dependencies & Icon Generator
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-community/admob
          npm install @capacitor/assets --save-dev
      - name: Create Android Project Layout
        run: |
          npx cap add android
      - name: Generate Green App Icon
        run: |
          mkdir -p assets
          cp www/assets/logo.png assets/icon-only.png 2>/dev/null || cp www/logo.png assets/icon-only.png 2>/dev/null || true
          cp www/assets/logo.png assets/icon.png 2>/dev/null || cp www/logo.png assets/icon.png 2>/dev/null || true
          npx capacitor-assets generate --android || true
      - name: Sync Capacitor Ads
        run: |
          npx cap sync android
      - name: Build Play Store AAB with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease || ./gradlew assembleDebug
      - name: Upload Play Store File
        uses: actions/upload-artifact@v4
        with:
          name: ScienceQuizPro-PlayStore-File
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/debug/app-debug.apk
